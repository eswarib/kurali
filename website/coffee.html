<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Support Coral — thank you for the coffee!">
  <title>Coral — Buy me a coffee</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3fbf9;
      --primary: #0d9488;
      --primary-bright: #14b8a6;
      --secondary: #0f766e;
      --glow: rgba(13, 148, 136, 0.35);
      --glow-soft: rgba(20, 184, 166, 0.22);
      --text: #134e4a;
      --muted: #5f7a78;
      --card-bg: #ecfdf5;
      --coffee-dark: #3d2314;
      --coffee-mid: #5c3824;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Kalam', cursive;
      font-weight: 400;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, var(--glow-soft), transparent 55%),
        radial-gradient(ellipse 80% 50% at 100% 50%, rgba(20, 184, 166, 0.08), transparent 45%);
      color: var(--text);
      text-align: center;
      padding: 2rem 1rem 4rem;
      min-height: 100vh;
    }

    .top-strip {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.75rem 1rem;
      max-width: 1200px;
      margin: 0 auto 1.5rem;
      padding: 0 0.5rem 1rem;
      border-bottom: 1px solid rgba(13, 148, 136, 0.2);
    }

    .top-strip .site-nav {
      grid-column: 2;
      justify-self: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.5rem 1.25rem;
      margin: 0;
      padding: 0;
      border: none;
    }

    .coffee-cta-top {
      grid-column: 3;
      justify-self: end;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 0.35rem 0.45rem;
      margin: 0;
      font-family: 'Caveat', cursive;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--secondary);
      line-height: 1.35;
      text-align: right;
    }

    .top-strip .button-top-donate {
      display: inline-block;
      text-decoration: none;
      padding: 0.35rem 0.5rem 0.3rem;
      font-size: 1.35rem;
      line-height: 1;
      white-space: nowrap;
      font-family: 'Caveat', cursive;
      background: #fffdf4;
      color: #0f766e;
      border: 2.5px solid #0f766e;
      border-radius: 12px 18px 14px 16px / 18px 12px 16px 14px;
      box-shadow: 2px 2px 0 #0f766e;
      transform: rotate(-2deg);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.2s ease;
    }
    .top-strip .button-top-donate:hover {
      background: #ecfdf5;
      transform: rotate(-2deg) translate(-1px, -1px);
      box-shadow: 3px 3px 0 #0f766e;
      filter: none;
    }
    .top-strip .button-top-donate:focus-visible {
      outline: 2px solid var(--secondary);
      outline-offset: 3px;
    }

    @media (max-width: 640px) {
      .top-strip {
        grid-template-columns: 1fr;
        justify-items: center;
      }
      .top-strip .site-nav { grid-column: 1; }
      .coffee-cta-top {
        grid-column: 1;
        justify-self: center;
        justify-content: center;
        text-align: center;
      }
    }

    nav.site-nav a {
      font-family: 'Caveat', cursive;
      color: var(--secondary);
      text-decoration: none;
      font-weight: 700;
      font-size: 1.35rem;
      padding: 0.35rem 0.55rem;
      border-radius: 0.35rem;
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    nav.site-nav a:hover {
      background: var(--card-bg);
      text-decoration: none;
      box-shadow: 0 0 18px var(--glow-soft);
    }

    /* Main pour CTA — hand-drawn style (matches index sketch cards). */
    button.btn-sketch {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: 1.55rem;
      line-height: 1;
      padding: 0.65rem 1.55rem 0.55rem;
      color: #0f766e;
      background: #fffdf4;
      border: 2.5px solid #0f766e;
      border-radius: 14px 22px 16px 24px / 22px 14px 24px 16px;
      cursor: pointer;
      transform: rotate(-1deg);
      box-shadow: 2px 2px 0 #0f766e;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.2s ease;
    }
    button.btn-sketch:hover:not(:disabled) {
      transform: rotate(-1deg) translate(-1px, -1px);
      box-shadow: 3px 3px 0 #0f766e;
      background: #ecfdf5;
    }
    button.btn-sketch:active:not(:disabled) {
      transform: rotate(-1deg) translate(1px, 1px);
      box-shadow: 1px 1px 0 #0f766e;
    }
    button.btn-sketch:disabled {
      opacity: 0.6;
      cursor: progress;
    }
    button.btn-sketch:focus-visible {
      outline: 2px solid var(--secondary);
      outline-offset: 3px;
    }

    .mug-stage {
      max-width: 420px;
      margin: 2rem auto 2rem;
      padding: 0 1rem;
    }

    .mug-svg {
      width: 100%;
      height: auto;
      max-height: min(72vh, 480px);
      filter: drop-shadow(0 14px 28px rgba(19, 78, 74, 0.12)) drop-shadow(0 4px 12px rgba(0, 0, 0, 0.06));
    }

    #coffee-liquid {
      transition: y 0.45s cubic-bezier(0.33, 1, 0.68, 1), height 0.45s cubic-bezier(0.33, 1, 0.68, 1);
    }

    .steam path,
    .steam line {
      fill: none;
      stroke: #b0b0b0;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .steam .wisp {
      opacity: 0;
      animation: none;
    }

    .steam.mug-hot .wisp {
      animation: steam-rise 2s ease-in-out infinite;
    }

    .steam.mug-hot .wisp:nth-child(1) { animation-delay: 0s; }
    .steam.mug-hot .wisp:nth-child(2) { animation-delay: 0.4s; }
    .steam.mug-hot .wisp:nth-child(3) { animation-delay: 0.8s; }

    @keyframes steam-rise {
      0% { opacity: 0; transform: translateY(6px); }
      35% { opacity: 0.9; }
      100% { opacity: 0; transform: translateY(-32px); }
    }

    @media (prefers-reduced-motion: reduce) {
      #coffee-liquid { transition: none; }
      .steam.mug-hot .wisp { animation: none; opacity: 0.45; }
    }

    h1 {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: clamp(2.2rem, 5vw, 3rem);
      letter-spacing: 0.02em;
      color: var(--secondary);
      margin: 0 0 0.5rem;
      text-shadow: 0 0 36px var(--glow-soft);
    }

    .lead {
      font-family: 'Kalam', cursive;
      color: #3f5a57;
      max-width: 30rem;
      margin: 0 auto 1.5rem;
      line-height: 1.5;
      font-size: 1.2rem;
    }

    .demo-banner {
      font-family: 'Kalam', cursive;
      max-width: 34rem;
      margin: 0 auto 1rem;
      padding: 0.65rem 1rem;
      font-size: 1.02rem;
      color: #0f766e;
      background: rgba(236, 253, 245, 0.95);
      border: 1.5px dashed rgba(13, 148, 136, 0.35);
      border-radius: 0.5rem;
      line-height: 1.45;
    }

    .mug-stats {
      font-family: 'Kalam', cursive;
      margin: 0 auto 0.5rem;
      font-size: 1.12rem;
      color: var(--text);
    }

    .mug-stats .full-cups-num {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: 1.65rem;
      color: var(--secondary);
    }

    .mug-stats-sub {
      color: var(--muted);
      font-size: 1rem;
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    #fill-hint {
      font-family: 'Kalam', cursive;
      min-height: 1.5rem;
      font-size: 1.08rem;
      color: #3f5a57;
      margin-top: 0.75rem;
    }

    footer {
      font-family: 'Caveat', cursive;
      color: #3f5a57;
      font-size: 1.35rem;
      font-weight: 600;
      margin-top: 3rem;
    }

    footer .footer-donate a {
      font-family: 'Caveat', cursive;
      color: var(--secondary);
      font-weight: 700;
      text-decoration: underline wavy rgba(13, 148, 136, 0.35);
      text-underline-offset: 4px;
      font-size: 1.2em;
      line-height: 1;
      vertical-align: -0.08em;
    }

    footer .footer-donate a:hover {
      color: #0d9488;
    }
  </style>
</head>
<body>

  <div class="top-strip">
    <nav class="site-nav" aria-label="Main">
      <a href="index.html">Home</a>
      <a href="index.html#support">Support</a>
      <a href="https://github.com/eswarib/coralapp" rel="noopener noreferrer">GitHub</a>
    </nav>
    <p class="coffee-cta-top">
      <span>If you like Coral, buy me a</span>
      <a class="button-top-donate" href="coffee.html" aria-current="page" title="You're here — tap the big button to fill the mug">☕</a>
    </p>
  </div>

  <main>
    <h1>Thanks for cheering on Coral</h1>
     
    <p class="lead" id="lead-text">Each click pours 1% into a mug shared by everyone on this page. When it hits 100%, it empties and the full-mug counter goes up.</p>
    <p class="demo-banner" id="demo-banner" hidden></p>
    <p class="mug-stats" id="mug-stats">
      <span class="full-cups-num" id="full-cups-count">0</span> full mugs
      <span class="mug-stats-sub"> (everyone, all time)</span>
    </p>

    <div class="mug-stage">
      <!-- Hot-beverage style: tapered cup, rim ring, no stroke through the liquid -->
      <svg class="mug-svg" viewBox="0 0 400 420" role="img" aria-labelledby="mug-title">
        <title id="mug-title">Coffee mug; fill level increases when you click Buy me a coffee</title>
        <defs>
          <linearGradient id="coffeeGrad" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#2c1810"/>
            <stop offset="35%" stop-color="#4e342e"/>
            <stop offset="85%" stop-color="#6d4c41"/>
            <stop offset="100%" stop-color="#8d6e63"/>
          </linearGradient>
          <clipPath id="inner-mug-clip">
            <rect id="inner-rect-ref" x="136" y="193" width="128" height="113"/>
          </clipPath>
        </defs>

        <!-- Handle (behind cup) -->
        <path fill="none" stroke="#2d2d2d" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"
          d="M 286 199 C 342 199 348 278 298 286"/>

        <!-- Coffee (no fill until pour — keeps chamber visually transparent) -->
        <g clip-path="url(#inner-mug-clip)">
          <rect id="coffee-liquid" x="136" y="306" width="128" height="0" fill="none"/>
        </g>

        <!-- Cup walls: stroke only (interior stays transparent) -->
        <path fill="none" stroke="#2d2d2d" stroke-width="4" stroke-linejoin="round"
          d="M 114 187 L 126 286 Q 200 322 274 286 L 286 187"/>

        <!-- Rim ring only (no solid fill) so the opening stays transparent -->
        <ellipse cx="200" cy="166" rx="88" ry="22" fill="none" stroke="#e8e8e8" stroke-width="14" stroke-linejoin="round"/>
        <ellipse cx="200" cy="166" rx="88" ry="22" fill="none" stroke="#2d2d2d" stroke-width="4" stroke-linejoin="round"/>

        <!-- Steam -->
        <g class="steam" id="steam-group">
          <g class="wisp" transform="translate(172 102)">
            <path fill="none" d="M 0 0 C 8 -10 2 -22 -4 -32"/>
          </g>
          <g class="wisp" transform="translate(200 95)">
            <path fill="none" d="M 0 0 C -10 -8 -4 -24 2 -36"/>
          </g>
          <g class="wisp" transform="translate(228 102)">
            <path fill="none" d="M 0 0 C 6 -12 8 -24 2 -34"/>
          </g>
        </g>
      </svg>
    </div>

    <div class="actions">
      <button type="button" class="btn-sketch" id="buy-coffee-btn">Buy me a coffee ☕</button>
      <p id="fill-hint" aria-live="polite"></p>
    </div>
  </main>

  <footer>
    <p class="footer-donate">
      <a href="index.html">← Back to Coral home</a>
    </p>
  </footer>

  <script type="module">
  /* Vendored bundle (~260KB). Refresh: bash website/vendor/rebundle.sh */
  import { createClient } from './vendor/supabase-js.mjs';

  /** Paste from Supabase → Settings → API (anon key is safe with RLS below). Leave empty to use offline demo only. */
  const CORAL_MUG_SUPABASE_URL = 'https://ruwdjzdiqfpyejywmjvw.supabase.co';
  const CORAL_MUG_SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1d2RqemRpcWZweWVqeXdtanZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzAyNzMsImV4cCI6MjA5MTMwNjI3M30.2euyDg2Kf1t-MGGejE7GXkT3YReiLFvzGCnw9wSkRPk';

  const INNER_TOP = 193;
  const INNER_BOTTOM = 306;
  const INNER_H = INNER_BOTTOM - INNER_TOP;
  const STEP = 1;

  const liquid = document.getElementById('coffee-liquid');
  const btn = document.getElementById('buy-coffee-btn');
  const hint = document.getElementById('fill-hint');
  const steam = document.getElementById('steam-group');
  const fullCupsEl = document.getElementById('full-cups-count');
  const demoBanner = document.getElementById('demo-banner');
  const leadText = document.getElementById('lead-text');

  let fillPct = 0;
  let fullCups = 0;
  let mode = 'demo';
  let client = null;
  let busy = false;

  function drawMug(p) {
    const clamped = Math.min(99, Math.max(0, p));
    const h = (clamped / 100) * INNER_H;
    liquid.setAttribute('y', INNER_BOTTOM - h);
    liquid.setAttribute('height', h);
    if (clamped > 0) {
      liquid.setAttribute('fill', 'url(#coffeeGrad)');
      steam.classList.add('mug-hot');
    } else {
      liquid.setAttribute('fill', 'none');
      steam.classList.remove('mug-hot');
    }
  }

  function updateHint() {
    const p = fillPct;
    if (p === 0 && fullCups > 0) {
      hint.textContent = 'The shared mug is empty again — ' + fullCups + ' full mug' + (fullCups === 1 ? '' : 's') + ' and counting.';
    } else if (p > 0) {
      hint.textContent = 'Shared mug is ' + p + '% full. Pour adds 1% for everyone.';
    } else {
      hint.textContent = 'Click to pour into the shared mug.';
    }
  }

  function applyState(fill, cups) {
    fillPct = fill;
    fullCups = cups;
    drawMug(fillPct);
    fullCupsEl.textContent = String(fullCups);
    updateHint();
  }

  function showDemo(msg) {
    mode = 'demo';
    demoBanner.hidden = false;
    demoBanner.textContent = msg;
    leadText.textContent = 'Offline demo: your pours stay in this browser only. For a real shared mug, add Supabase URL and anon key in the script on this page (see website/supabase-mug.sql).';
  }

  function demoPour() {
    const before = fillPct;
    const crossed30 = before < 30 && before + STEP >= 30;
    fillPct += STEP;
    let crossedFull = false;
    while (fillPct >= 100) {
      fillPct -= 100;
      fullCups += 1;
      crossedFull = true;
    }
    applyState(fillPct, fullCups);
    if (crossedFull) {
      hint.textContent = 'Full mug! It empties and the counter just went up. 💛';
    }
    if (crossed30) {
      console.info('Coral mug: shared pour crossed 30% (for email, wire a Supabase Database Webhook — see website/supabase-mug.sql).');
    }
  }

  async function callPourRpc() {
    const { data, error } = await client.rpc('pour_coffee', { step: STEP });
    if (error) throw error;
    return data;
  }

  function normalizePourRow(data) {
    const row = Array.isArray(data) ? data[0] : data;
    if (!row || typeof row !== 'object') return null;
    return row;
  }

  async function livePour() {
    if (busy) return;
    busy = true;
    btn.disabled = true;
    try {
      const data = await callPourRpc();
      const row = normalizePourRow(data);
      if (row && typeof row.fill_pct === 'number' && typeof row.full_cups === 'number') {
        applyState(row.fill_pct, row.full_cups);
        if (row.crossed_30) {
          console.info('Mug crossed 30% — if email is wired (Supabase webhook), a message can go out.');
        }
      } else {
        throw new Error('Unexpected RPC response shape from pour_coffee');
      }
    } catch (e) {
      const details = (e && typeof e.message === 'string' && e.message.trim()) ? ': ' + e.message : '.';
      hint.textContent = 'Could not pour (network or server)' + details;
      console.error(e);
    } finally {
      busy = false;
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', () => {
    if (mode === 'live') livePour();
    else demoPour();
  });

  async function init() {
    const configured = Boolean(CORAL_MUG_SUPABASE_URL && CORAL_MUG_SUPABASE_ANON_KEY);

    if (!configured) {
      showDemo('');
      applyState(0, 0);
      return;
    }

    client = createClient(CORAL_MUG_SUPABASE_URL, CORAL_MUG_SUPABASE_ANON_KEY);

    const { data, error } = await client
      .from('mug_state')
      .select('fill_pct, full_cups')
      .eq('id', 1)
      .maybeSingle();

    if (error) {
      console.error(error);
      showDemo('Could not reach Supabase — playing offline in this tab.');
      applyState(0, 0);
      return;
    }

    mode = 'live';
    demoBanner.hidden = true;
    if (data && typeof data.fill_pct === 'number') {
      applyState(data.fill_pct, Number(data.full_cups));
    } else {
      applyState(0, 0);
    }

    client
      .channel('mug_state_changes')
      .on(
        'postgres_changes',
        { event: 'UPDATE', schema: 'public', table: 'mug_state', filter: 'id=eq.1' },
        (payload) => {
          const row = payload.new;
          if (row && typeof row.fill_pct === 'number' && typeof row.full_cups !== 'undefined') {
            applyState(row.fill_pct, Number(row.full_cups));
          }
        }
      )
      .subscribe();
  }

  init();
  </script>

</body>
</html>
