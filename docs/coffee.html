<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Support Coral — thank you for the coffee!">
  <title>Coral — Buy me a coffee</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3fbf9;
      --primary: #0d9488;
      --primary-bright: #14b8a6;
      --secondary: #0f766e;
      --glow: rgba(13, 148, 136, 0.35);
      --glow-soft: rgba(20, 184, 166, 0.22);
      --text: #134e4a;
      --muted: #5f7a78;
      --card-bg: #ecfdf5;
      --coffee-dark: #3d2314;
      --coffee-mid: #5c3824;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, var(--glow-soft), transparent 55%),
        radial-gradient(ellipse 80% 50% at 100% 50%, rgba(20, 184, 166, 0.08), transparent 45%);
      color: var(--text);
      text-align: center;
      padding: 2rem 1rem 4rem;
      min-height: 100vh;
    }

    .top-strip {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.75rem 1rem;
      max-width: 1200px;
      margin: 0 auto 1.5rem;
      padding: 0 0.5rem 1rem;
      border-bottom: 1px solid rgba(13, 148, 136, 0.2);
    }

    .top-strip .site-nav {
      grid-column: 2;
      justify-self: center;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.5rem 1.25rem;
      margin: 0;
      padding: 0;
      border: none;
    }

    .coffee-cta-top {
      grid-column: 3;
      justify-self: end;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 0.35rem 0.45rem;
      margin: 0;
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.35;
      text-align: right;
    }

    .top-strip .button-top-donate {
      padding: 0.45rem 0.55rem;
      font-size: 1.2rem;
      line-height: 1;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .top-strip {
        grid-template-columns: 1fr;
        justify-items: center;
      }
      .top-strip .site-nav { grid-column: 1; }
      .coffee-cta-top {
        grid-column: 1;
        justify-self: center;
        justify-content: center;
        text-align: center;
      }
    }

    nav.site-nav a {
      color: var(--secondary);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.35rem 0.5rem;
      border-radius: 0.35rem;
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    nav.site-nav a:hover {
      background: var(--card-bg);
      text-decoration: none;
      box-shadow: 0 0 18px var(--glow-soft);
    }

    a.button {
      display: inline-block;
      background: linear-gradient(145deg, var(--primary-bright), var(--primary));
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      font-family: inherit;
      box-shadow:
        0 2px 12px var(--glow-soft),
        0 1px 2px rgba(19, 78, 74, 0.12);
      transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    a.button:hover, button.button:hover {
      filter: brightness(1.05);
      box-shadow:
        0 4px 24px var(--glow),
        0 2px 8px rgba(13, 148, 136, 0.25);
      transform: translateY(-1px);
    }

    button.button:active {
      transform: translateY(0);
    }

    a.button:focus-visible, button.button:focus-visible {
      outline: 2px solid var(--secondary);
      outline-offset: 3px;
    }

    .mug-stage {
      max-width: 420px;
      margin: 2rem auto 2rem;
      padding: 0 1rem;
    }

    .mug-svg {
      width: 100%;
      height: auto;
      max-height: min(70vh, 520px);
      filter: drop-shadow(0 12px 24px rgba(13, 148, 136, 0.15));
    }

    #coffee-liquid {
      transition: y 0.45s cubic-bezier(0.33, 1, 0.68, 1), height 0.45s cubic-bezier(0.33, 1, 0.68, 1);
    }

    .steam line {
      stroke: rgba(20, 184, 166, 0.45);
      stroke-width: 3;
      stroke-linecap: round;
    }

    .steam .wisp {
      opacity: 0;
      animation: none;
    }

    .steam.mug-hot .wisp {
      animation: steam-rise 2s ease-in-out infinite;
    }

    .steam.mug-hot .wisp:nth-child(1) { animation-delay: 0s; }
    .steam.mug-hot .wisp:nth-child(2) { animation-delay: 0.4s; }
    .steam.mug-hot .wisp:nth-child(3) { animation-delay: 0.8s; }

    @keyframes steam-rise {
      0% { opacity: 0; transform: translateY(6px); }
      35% { opacity: 0.9; }
      100% { opacity: 0; transform: translateY(-32px); }
    }

    @media (prefers-reduced-motion: reduce) {
      #coffee-liquid { transition: none; }
      .steam.mug-hot .wisp { animation: none; opacity: 0.45; }
    }

    h1 {
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      color: var(--secondary);
      margin: 0 0 0.5rem;
    }

    .lead {
      color: var(--muted);
      max-width: 28rem;
      margin: 0 auto 1.5rem;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 1rem;
    }

    .wise-link {
      color: var(--secondary);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .wise-link:hover {
      text-decoration: underline;
    }

    #fill-hint {
      min-height: 1.5rem;
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 0.75rem;
    }

    footer {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 3rem;
    }

    footer .footer-donate a {
      color: var(--secondary);
      font-weight: 600;
      text-decoration: none;
      font-size: 1.15em;
      line-height: 1;
      vertical-align: -0.08em;
    }

    footer .footer-donate a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="top-strip">
    <nav class="site-nav" aria-label="Main">
      <a href="index.html">Home</a>
      <a href="index.html#support">Support</a>
      <a href="https://github.com/eswarib/coralapp" rel="noopener noreferrer">GitHub</a>
    </nav>
    <p class="coffee-cta-top">
      <span>If you like Coral, buy me a</span>
      <a class="button button-top-donate" href="coffee.html" aria-current="page" title="You're here — tap the big button to fill the mug">☕</a>
    </p>
  </div>

  <main>
    <h1>Thanks for cheering on Coral</h1>
    <p class="lead">Each click on the button pours a little more into the mug. When you’re ready to send real support, use Wise below.</p>

    <div class="mug-stage">
      <svg class="mug-svg" viewBox="0 0 400 480" role="img" aria-labelledby="mug-title">
        <title id="mug-title">Coffee mug; fill level increases when you click Buy me a coffee</title>
        <defs>
          <linearGradient id="coffeeGrad" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#2d1810"/>
            <stop offset="50%" stop-color="#4a2c1a"/>
            <stop offset="100%" stop-color="#6b4423"/>
          </linearGradient>
          <linearGradient id="rimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color: #fefefe"/>
            <stop offset="100%" style="stop-color: #e8e4df"/>
          </linearGradient>
          <clipPath id="inner-mug-clip">
            <rect id="inner-rect-ref" x="103" y="108" width="169" height="278" rx="6" ry="6"/>
          </clipPath>
        </defs>

        <!-- Handle (back) -->
        <path fill="none" stroke="#1a4540" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"
          d="M 278 125 C 348 125 348 288 278 294"/>

        <!-- Liquid (visible through hole in mug wall) -->
        <g clip-path="url(#inner-mug-clip)">
          <rect id="coffee-liquid" x="103" y="386" width="169" height="0" fill="url(#coffeeGrad)"/>
        </g>

        <!-- Mug wall (even-odd: outer shape minus interior hole; stroke is outer silhouette only) -->
        <path fill="url(#rimGrad)" fill-rule="evenodd"
          d="M 95 105 L 95 360 Q 97 398 187.5 398 Q 278 398 280 360 L 280 105 L 95 105 Z
             M 103 108 L 272 108 L 272 386 L 103 386 Z"/>
        <path fill="none" stroke="#1a4540" stroke-width="3.5" stroke-linejoin="round"
          d="M 95 105 L 95 360 Q 97 398 187.5 398 Q 278 398 280 360 L 280 105 L 95 105 Z"/>
        <!-- Rim ellipse -->
        <ellipse cx="187.5" cy="105" rx="93" ry="19" fill="#f0ebe5" stroke="#1a4540" stroke-width="3.5"/>

        <!-- Steam (above rim) -->
        <g class="steam" id="steam-group" transform="translate(0 -5)">
          <g class="wisp" transform="translate(128 78)">
            <line x1="0" y1="0" x2="6" y2="-20"/>
          </g>
          <g class="wisp" transform="translate(187 74)">
            <line x1="0" y1="0" x2="-5" y2="-24"/>
          </g>
          <g class="wisp" transform="translate(245 78)">
            <line x1="0" y1="0" x2="4" y2="-22"/>
          </g>
        </g>

        <!-- Inner rim shadow hint -->
        <ellipse cx="187.5" cy="108" rx="80" ry="12" fill="none" stroke="rgba(26,69,64,0.12)" stroke-width="2"/>
      </svg>
    </div>

    <div class="actions">
      <button type="button" class="button" id="buy-coffee-btn">Buy me a coffee ☕</button>
      <p id="fill-hint" aria-live="polite"></p>
      <a class="wise-link" href="https://wise.com/pay/me/sankareswarym" rel="noopener noreferrer">Support on Wise (opens payment page)</a>
    </div>
  </main>

  <footer>
    <p class="footer-donate">
      <a href="index.html">← Back to Coral home</a>
    </p>
  </footer>

  <script>
(function () {
  var INNER_TOP = 108;
  var INNER_BOTTOM = 386;
  var INNER_H = INNER_BOTTOM - INNER_TOP;
  var STEP = 1;
  var pct = 0;
  var liquid = document.getElementById('coffee-liquid');
  var btn = document.getElementById('buy-coffee-btn');
  var hint = document.getElementById('fill-hint');
  var steam = document.getElementById('steam-group');

  function setFill(percent) {
    var p = Math.min(100, Math.max(0, percent));
    var h = (p / 100) * INNER_H;
    liquid.setAttribute('y', INNER_BOTTOM - h);
    liquid.setAttribute('height', h);
    if (p > 0) {
      steam.classList.add('mug-hot');
    } else {
      steam.classList.remove('mug-hot');
    }
    if (p >= 100) {
      hint.textContent = 'Full mug! You’re wonderful. Thanks for playing along. 💛';
    } else if (p > 0) {
      hint.textContent = 'Keep going — the mug is ' + Math.round(p) + '% full.';
    } else {
      hint.textContent = 'Click the button to pour.';
    }
  }

  btn.addEventListener('click', function () {
    pct = Math.min(100, pct + STEP);
    setFill(pct);
  });

  setFill(0);
})();
  </script>

</body>
</html>
